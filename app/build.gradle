apply plugin: 'com.android.application'

android {
    defaultConfig {
        applicationId "de.kuix.widekeykeyboard"
        compileSdk 36
        minSdkVersion 24
        targetSdkVersion 36
        versionCode 163
        versionName "0.3.2"
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    namespace 'de.kuix.widekeykeyboard'
    bundle {
        language {
            enableSplit = false
        }
    }
}

dependencies {
}
