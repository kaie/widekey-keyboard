apply plugin: 'com.android.application'

android {
    defaultConfig {
        applicationId "de.kuix.widekeykeyboard"
        compileSdk 36
        minSdkVersion 24
        targetSdkVersion 36
        versionCode 146
        versionName "0.1.1"
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    namespace 'de.kuix.widekeykeyboard'
}

dependencies {
}
